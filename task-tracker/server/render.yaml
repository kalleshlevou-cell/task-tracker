services:
  - type: web
    name: task-tracker-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your Vercel frontend URL
